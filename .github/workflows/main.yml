name: run_pytest

on: 
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
    
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with: 
          python-version: "3.12"
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install requests

      - name: Run pytest
        run: pytest --tb=short -v
